name: Update savings rates

# 使用 Node 24 运行 actions，消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

on:
  schedule:
    # 每周一 15:00 UTC（温哥华约早上 8 点）— 更新利率
    - cron: '0 15 * * 1'
    # 每月 5 号 16:00 UTC — 强制更新房产数据（GVR 通常月初发布）
    - cron: '0 16 5 * *'
  workflow_dispatch: # 允许手动运行
    inputs:
      force_property:
        description: '强制重新抓取房产数据（忽略本月缓存）'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Scrape and build
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          # 每月 5 号触发或手动指定时，强制刷新房产缓存
          FORCE_PROPERTY_REFRESH: ${{ (github.event.schedule == '0 16 5 * *' || github.event.inputs.force_property == 'true') && 'true' || 'false' }}
        run: python scrape_and_build.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html top3.json property_data.json
          git diff --staged --quiet || (git commit -m "chore: update rates and property data" && git push)
