name: Update savings rates

permissions:
  contents: write

on:
  schedule:
    # 每周一 15:00 UTC（温哥华约早上 8 点）
    - cron: '0 15 * * 1'
  workflow_dispatch: # 允许手动运行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and build
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python scrape_and_build.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html top3.json
          git diff --staged --quiet || (git commit -m "chore: update top 3 savings rates" && git push)
