name: Update smart dashboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

on:
  schedule:
    # 每天 14:00 UTC（温哥华约早上 7 点 PDT）
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch data and rebuild smart dashboard
        run: python smart_money.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html smart_money_data.json
          git diff --staged --quiet || (git commit -m "chore: update smart dashboard data" && git push)
